name: DevSkim

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # CommonMark spec fixtures intentionally include unsafe URLs
          # (javascript:, file://, raw HTML) that must not flag as findings.
          ignore-globs: "**/tools/spec/**,**/tests/fixtures/**,**/target/**"

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif
