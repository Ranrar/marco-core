name: Publish marco-core to crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (pinned)
        id: toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-publish-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libfontconfig-dev

      - name: Validate version not already published
        run: |
          set -euo pipefail
          crate_name="$(grep '^name' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          crate_version="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          published_versions="$(curl -fsSL -H "User-Agent: marco-core-ci/publish (github.com/Ranrar/marco-core)" "https://crates.io/api/v1/crates/${crate_name}/versions")"
          if echo "$published_versions" | grep -q '"num":"'"$crate_version"'"'; then
            echo "::error title=Version already published::${crate_name} ${crate_version} already exists on crates.io."
            exit 1
          fi
          echo "Version ${crate_version} not yet published — proceeding."

      - name: Verify (test + clippy)
        run: |
          cargo test --locked
          cargo clippy --all-targets --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
